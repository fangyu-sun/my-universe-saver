<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyUniverse</title>
    <link rel="stylesheet" href="style.css?v=20260526_1">
</head>
<body>
    <div id="app">
        <!-- 核心播报界面，零交互，默认直接显示 -->
        <div id="broadcaster">
            <!-- 顶部/中间位置：城市和时间 -->
            <div id="location-time-info">-- · --:--</div>
            <div id="coord-display" style="font-size: 0.8rem; color: rgba(255,255,255,0.4); margin-bottom: 20px; letter-spacing: 1px;">0.0, 0.0</div>
            
            <!-- 中间核心点缀 -->
            <div class="zenith-dot"></div>
            
            <!-- 星空漫游主文案 (预留) -->
            <h1 id="main-copy"></h1>
            
            <!-- 底部：宇宙状态播报 -->
            <div id="meta-info">WAITING FOR TELEMETRY...</div>
        </div>
    </div>
    <script src="main.js?v=20260526_1"></script>
</body>
</html>
