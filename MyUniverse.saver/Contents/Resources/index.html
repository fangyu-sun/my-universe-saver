<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyUniverse</title>
    <link rel="stylesheet" href="style.css?v=20260526_2">
</head>
<body>
    <div id="app">
        <!-- 核心播报界面，零交互，默认直接显示 -->
        <div id="broadcaster">
            <!-- 顶部：地点与时间 -->
            <div id="top-meta">
                <div id="location-time-info">-- · --:--</div>
                <div id="coord-display">0.0, 0.0</div>
            </div>
            
            <!-- 中间核心点缀 -->
            <div class="zenith-dot"></div>
            
            <!-- 中间：宇宙叙事主文案 -->
            <div id="main-narrative-container">
                <h1 id="main-narrative"></h1>
            </div>
            
            <!-- 底部：技术状态行 -->
            <div id="bottom-status">
                <div id="meta-info">WAITING FOR TELEMETRY...</div>
            </div>
        </div>
    </div>
    
    <!-- 加载离线天文与卫星引擎 -->
    <script src="astronomy.browser.min.js"></script>
    <script src="satellite.min.js"></script>
    
    <!-- ES Module 加载前的配置缓冲 -->
    <script>
        window.pendingConfig = null;
        window.updateConfig = function(config) {
            window.pendingConfig = config;
        };
    </script>

    <!-- 加载核心播报逻辑 -->
    <script src="data/constellations.js"></script>
    <script src="astronomy_wrapper.js"></script>
    <script src="main.js?v=20260526_6"></script>
</body>
</html>
